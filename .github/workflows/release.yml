name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome
        run: npx wxt build -b chrome

      - name: Build Firefox
        run: npx wxt build -b firefox

      - name: Package Firefox XPI
        run: |
          cd output/firefox-mv2
          zip -r ../../memeify-thumbnail-firefox.xpi .

      - name: Package Chrome ZIP
        run: |
          cd output/chrome-mv3
          zip -r ../../memeify-thumbnail-chrome.zip .

      - name: Create Chrome CRX3
        env:
          CRX_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$CRX_KEY" > crx-key.pem
          chmod 600 crx-key.pem
          npx -y crx3@latest \
            -c output/chrome-mv3 \
            -p crx-key.pem \
            -o memeify-thumbnail-chrome.crx 2>&1 || {
            echo "crx3 failed, skipping CRX"
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memeify-thumbnail-chrome.crx
            memeify-thumbnail-chrome.zip
            memeify-thumbnail-firefox.xpi
          fail_on_unmatched_files: false
          generate_release_notes: true
