name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome
        run: npx wxt build -b chrome

      - name: Build Firefox
        run: npx wxt build -b firefox

      - name: Package Chrome ZIP
        run: |
          cd output/chrome-mv3 && zip -r ../../memeify-thumbnail-chrome.zip .

      - name: Package Firefox XPI
        run: |
          cd output/firefox-mv2 && zip -r ../../memeify-thumbnail-firefox.xpi .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memeify-thumbnail-chrome.zip
            memeify-thumbnail-firefox.xpi
          generate_release_notes: true
